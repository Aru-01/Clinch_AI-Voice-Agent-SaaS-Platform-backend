<!DOCTYPE html>
<html>
  <body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4; padding:20px 0;">
      <tr>
        <td align="center">
          <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; padding:30px;">
            <!-- Logo -->
            <tr>
              <td align="center" style="padding-bottom:20px;">
                <div class="logo">
                  <div style="font-weight: bold; font-size: 24px; color: #333; margin-top: 10px;">Clinch</div>
                  <div style="font-size: 10px; color: #999; letter-spacing: 2px; text-transform: uppercase;">AI Voice Agent</div>
                </div>
              </td>
            </tr>

            <!-- Title -->
            <tr>
              <td style="font-size:22px; color:#333; padding-bottom:10px;">Hi {{ user_name }},</td>
            </tr>

            <!-- Content -->
            <tr>
              <td style="font-size:15px; color:#666; line-height:1.6;">
                Here is your One Time Password (OTP).<br />
                Please enter this code to verify your email address.
              </td>
            </tr>

            <tr>
              <td align="center" style="padding:30px 0;">
                <table cellpadding="0" cellspacing="0">
                  <tr>
                    {% for digit in otp_digits %}
                      <td style="padding:0 5px;">
                        <table cellpadding="0" cellspacing="0">
                          <tr>
                            <td style="background:#f0f4ff; font-size:28px; font-weight:bold; padding:12px 18px; border-radius:6px; text-align:center;">{{ digit }}</td>
                          </tr>
                        </table>
                      </td>
                    {% endfor %}
                  </tr>
                </table>
              </td>
            </tr>
            <!-- Expiry -->
            <tr>
              <td style="font-size:13px; color:#999;">
                OTP will expire in <b>5 minutes</b>.
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding-top:30px; font-size:14px; color:#666;">
                Best Regards,<br />
                <b style="color:#4a90e2;">Clinch</b> team.
              </td>
            </tr>

            <tr>
              <td style="padding-top:30px; border-top:1px solid #eee; text-align:center; font-size:12px; color:#999;">© 2026 Clinch. All rights reserved.</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
